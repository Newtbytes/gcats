require:
  - beet_plugins.mergeables
  - datapack.cascades

name: GCATs
description: GCATs server resources.

resource_pack:
  load:
    - resourcepack/VanillaTweaks_MC1.21.x.zip
    - https://cdn.modrinth.com/data/tPtjib62/versions/w7MCM1Bk/visual_armor_trims_4.1.zip
    - https://cdn.modrinth.com/data/6gN7YVi7/versions/4z5iFY64/Re-covered.zip
    - https://cdn.modrinth.com/data/OhzX8kDf/versions/4if0gBBN/Theone%27s%20Eating%20Animation%20Pack%20v1.0.zip
    - https://cdn.modrinth.com/data/ivUZsvzp/versions/5zlKz15s/better_flame_particles-v3.1-mc1.21.9%2B-resourcepack.zip
    - https://cdn.modrinth.com/data/zp6touiL/versions/43cYxPZ8/Just-Atlas_RP_v2-1_1-21-5.zip
    - resourcepack/remove-too-expensive

  zipped: true

  name: "{{ project_name }}-resourcepack"
  description: "{{ project_description }}"
  pack_format: 69

data_pack:
  load:
    - https://cdn.modrinth.com/data/Jmx5kJiS/versions/zCun0Pkf/cascades-v1.0.5-1.21.9-1.21.10.zip
    - https://cdn.modrinth.com/data/hl5OLM95/versions/NocMg9CU/Geophilic%20v3.4.4%20f15-88.dp.zip
    - https://cdn.modrinth.com/data/wXiGiyGX/versions/68re3WvL/Amplified_Nether_1.21_v1.2.11.zip
    - https://cdn.modrinth.com/data/BuWCQzqf/versions/cn9MTN70/hopobetterunderwaterruins-1-21-10-1-2-5.zip
    - https://cdn.modrinth.com/data/9IxCUYAP/versions/E4SgyyKV/hopobettermineshaft-1-21-10-1-3-4.zip
    - datapack/modally_stranded
    - datapack/clifftree-tweaks

  zipped: true

  name: "{{ project_name }}-datapack"
  description: "{{ project_description }}"
  pack_format: 88

pipeline:
  - beet.contrib.copy_files
  - beet_plugins.fix_formats
  - beet_plugins.remove_overlays

meta:
  copy_files:
    resource_pack:
      pack.png: server-icon.png
    data_pack:
      pack.png: server-icon.png
  remove_overlays:
    overlays:
      # this overlay exists in geophilic but is not used, which confuses beet and breaks the pack
      - biomes_1_20

      - empty-overlay

output: build
